<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kairos">
  <defs>
    <radialGradient id="atmosphere" cx="25%" cy="18%" r="78%">
      <stop offset="0%" stop-color="#9966FF" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#9966FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0A0A0E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="triangle-fill" x1="256" y1="82" x2="256" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BA97FF"/>
      <stop offset="45%" stop-color="#A774FF"/>
      <stop offset="100%" stop-color="#7F46F3"/>
    </linearGradient>
    <filter id="triangle-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="114" fill="#0A0A0E"/>
  <rect width="512" height="512" rx="114" fill="url(#atmosphere)"/>

  <polygon
    points="256,82 104,430 408,430"
    fill="#9966FF"
    opacity="0.16"
    filter="url(#triangle-glow)"
  />

  <polygon
    points="256,82 104,430 408,430"
    fill="url(#triangle-fill)"
  />

  <line
    x1="256"
    y1="82"
    x2="104"
    y2="430"
    stroke="#FFFFFF"
    stroke-opacity="0.22"
    stroke-width="10"
    stroke-linecap="round"
  />

  <circle cx="256" cy="82" r="13" fill="#FFFFFF" fill-opacity="0.58"/>
</svg>
